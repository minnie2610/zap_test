name: Generate Code Documentation

on:
  pull_request:
    types: [labeled]

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'needs-docs')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref }}
      
      - name: Get changed files
        id: files
        run: |
          FILES=$(git diff --name-only origin/main...HEAD | grep -E '\.(py|js|java|go)$' | head -5)
          echo "files=$FILES" >> $GITHUB_OUTPUT
      
      - name: Read code files
        id: code
        run: |
          CODE_CONTENT=""
          for file in ${{ steps.files.outputs.files }}; do
            if [ -f "$file" ]; then
              CODE_CONTENT="$CODE_CONTENT$(cat $file)"$'\n---FILE_SEPARATOR---\n'
            fi
          done
          echo "content<<EOF" >> $GITHUB_ENV
          echo "$CODE_CONTENT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      
      - name: Trigger Zapier webhook
        run: |
          curl -X POST ${{ secrets.ZAPIER_WEBHOOK_URL }} \
            -H "Content-Type: application/json" \
            -d '{
              "masked_code": "'"$(echo "${{ env.content }}" | sed 's/"/\\"/g')"'",
              "author_email": "${{ github.event.pull_request.user.login }}@github.com",
              "pr_branch_name": "${{ github.event.pull_request.head.ref }}",
              "pr_url": "${{ github.event.pull_request.html_url }}",
              "pr_number": "${{ github.event.pull_request.number }}",
              "repo_name": "${{ github.event.repository.name }}",
              "callback_url": "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments"
            }'
